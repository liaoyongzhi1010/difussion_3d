runtime:
  workdir: /root/3d/generation
  python_bin: /root/3d/generation/.venv/bin/python
  shell_bin: /bin/bash
  poll_seconds: 120
  idle_gpu_util_below: 10
  idle_memory_used_mib_below: 2048
  state_path: outputs/pipeline_supervisor_state.json
  log_path: outputs/pipeline_supervisor.log
  env:
    PYTHONPATH: src
stages:
- name: geometry_vae
  max_parallel_jobs: 2
  tasks:
  - name: geometry_vae_bs256_fullresume
    enabled: true
    match_substring: geometry_vae_bs256_fullresume_summary.json
    completion:
      type: summary_field_gte
      path: outputs/real_data/geometry_vae_objects_v1_full/geometry_vae_bs256_fullresume_summary.json
      field: last_epoch
      threshold: 800
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/train/train_geometry_vae.py
    - --config
    - configs/geometry_vae/base.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --object-root
    - outputs/real_data/geometry_vae_objects_v1_full
    - --batch-size
    - '256'
    - --epochs
    - '800'
    - --checkpoint-dir
    - outputs/real_data/geometry_vae_objects_v1_full/checkpoints_geometry_vae_bs256_fullresume
    - --save-summary
    - outputs/real_data/geometry_vae_objects_v1_full/geometry_vae_bs256_fullresume_summary.json
    - --save-every-epochs
    - '20'
    - --seed
    - '42'
    - --resume
    - outputs/real_data/geometry_vae_objects_v1_full/checkpoints_geometry_vae_bs256_fullresume/latest.pt
    log_path: outputs/real_data/geometry_vae_objects_v1_full/logs/geometry_vae_bs256_fullresume.log
  - name: geometry_vae_heavy_fullresume
    enabled: true
    match_substring: geometry_vae_heavy_fullresume_summary.json
    completion:
      type: summary_field_gte
      path: outputs/real_data/geometry_vae_objects_v1_full/geometry_vae_heavy_fullresume_summary.json
      field: last_epoch
      threshold: 600
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/train/train_geometry_vae.py
    - --config
    - configs/geometry_vae/heavy.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --object-root
    - outputs/real_data/geometry_vae_objects_v1_full
    - --batch-size
    - '96'
    - --epochs
    - '600'
    - --checkpoint-dir
    - outputs/real_data/geometry_vae_objects_v1_full/checkpoints_geometry_vae_heavy_fullresume
    - --save-summary
    - outputs/real_data/geometry_vae_objects_v1_full/geometry_vae_heavy_fullresume_summary.json
    - --save-every-epochs
    - '20'
    - --seed
    - '42'
    - --resume
    - outputs/real_data/geometry_vae_objects_v1_full/checkpoints_geometry_vae_heavy_fullresume/latest.pt
    log_path: outputs/real_data/geometry_vae_objects_v1_full/logs/geometry_vae_heavy_fullresume.log
- name: learned_latent_export_train2048
  max_parallel_jobs: 1
  tasks:
  - name: export_learned_geometry_latents_train2048
    enabled: true
    match_substring: geometry_latent_export_train2048_summary.json
    completion:
      type: summary_field_gte
      dir: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/geometry
      glob: '*.pt'
      threshold: 3758
      path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/geometry_latent_export_train2048_summary.json
      field: available_objects
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/preprocess/export_geometry_latents.py
    - --checkpoint
    - outputs/real_data/geometry_vae_objects_v1_full/checkpoints_geometry_vae_bs256_fullresume/best.pt
    - --object-root
    - outputs/real_data/geometry_vae_objects_v1_full
    - --uid-source-dir
    - outputs/real_data/pixarmesh_depr_bootstrap_train2048_norm/geometry
    - --output-dir
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/geometry
    - --batch-size
    - '256'
    - --device
    - cuda
    - --save-summary
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/geometry_latent_export_train2048_summary.json
    log_path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/logs/geometry_latent_export_train2048.log
- name: packet_rewrite_train2048
  max_parallel_jobs: 1
  tasks:
  - name: rewrite_packets_with_learned_latents_train2048
    enabled: true
    match_substring: packet_rewrite_train2048_summary.json
    completion:
      type: file_count_gte
      dir: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/packets
      glob: '*.pt'
      threshold: 1949
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/preprocess/rewrite_packets_with_geometry_latents.py
    - --src-root
    - outputs/real_data/pixarmesh_depr_bootstrap_train2048_norm
    - --dst-root
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm
    - --latent-dir
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/geometry
    - --save-summary
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/packet_rewrite_train2048_summary.json
    log_path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/logs/packet_rewrite_train2048.log
- name: scene_diffusion_learned_train2048
  max_parallel_jobs: 1
  tasks:
  - name: train_scene_diffusion_learnedgeo_bs256_train2048
    enabled: true
    match_substring: denoiser_train_learnedgeo_bs256_train2048_summary.json
    completion:
      type: summary_field_gte
      path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/denoiser_train_learnedgeo_bs256_train2048_summary.json
      field: end_step
      threshold: 12000
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/train/train_scene_diffusion.py
    - --config
    - configs/diffusion/base.yaml
    - --data-config
    - configs/data/3dfront_v1.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --packet-dir
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/packets
    - --batch-size
    - '8'
    - --max-samples
    - '1949'
    - --train-steps
    - '12000'
    - --checkpoint-dir
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/checkpoints_scene_denoiser_v1
    - --save-summary
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/denoiser_train_learnedgeo_bs256_train2048_summary.json
    - --save-every-steps
    - '1000'
    log_path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/logs/denoiser_train_learnedgeo_bs256_train2048.log

- name: scene_posterior_eval_learned_train2048
  max_parallel_jobs: 1
  tasks:
  - name: eval_scene_posterior_learnedgeo_step12000_test_p5_s20
    enabled: true
    match_substring: posterior_eval_step12000_test_p5_s20.json
    completion:
      type: file_exists
      path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/posterior_eval_step12000_test_p5_s20.json
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/eval/eval_scene_posterior.py
    - --checkpoint
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/checkpoints_scene_denoiser_v1/step_0012000.pt
    - --packet-dir
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/packets
    - --config
    - configs/diffusion/base.yaml
    - --data-config
    - configs/data/3dfront_v1.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --batch-size
    - '16'
    - --max-samples
    - '0'
    - --num-posterior-samples
    - '5'
    - --num-inference-steps
    - '20'
    - --sample-id-json
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/index/split_to_sample_ids.json
    - --split
    - test
    - --save-summary
    - outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/posterior_eval_step12000_test_p5_s20.json
    log_path: outputs/real_data/pixarmesh_depr_learnedgeo_bs256_train2048_norm/logs/posterior_eval_step12000_test_p5_s20.log
