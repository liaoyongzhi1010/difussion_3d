runtime:
  workdir: /root/3d/generation
  python_bin: /root/3d/generation/.venv/bin/python
  shell_bin: /bin/bash
  poll_seconds: 60
  idle_gpu_util_below: 10
  idle_memory_used_mib_below: 2048
  state_path: outputs/visible_locked_compare_supervisor_state.json
  log_path: outputs/visible_locked_compare_supervisor.log
  env:
    PYTHONPATH: src
  backfill_command:
  - /root/3d/generation/.venv/bin/python
  - scripts/ops/backfill_visible_locked_compare.py
stages:
- name: visible_locked_train_variants
  max_parallel_jobs: 2
  tasks:
  - name: train_visiblelocked_resume_b128
    enabled: true
    match_substring: denoiser_train_visiblelocked_resume_b128_summary.json
    completion:
      type: summary_field_gte
      path: outputs/real_data/pixarmesh_bootstrap_visiblelocked_resume_b128_train2048/denoiser_train_visiblelocked_resume_b128_summary.json
      field: end_step
      threshold: 24000
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/train/train_scene_diffusion.py
    - --config
    - configs/diffusion/visible_locked.yaml
    - --data-config
    - configs/data/3dfront_v1.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --packet-dir
    - outputs/real_data/pixarmesh_depr_bootstrap_train2048_norm/packets
    - --batch-size
    - 128
    - --max-samples
    - 1949
    - --train-steps
    - 12000
    - --resume-from
    - outputs/real_data/pixarmesh_bootstrap_visiblelocked_train2048_norm/checkpoints_scene_denoiser_v1/step_0012000.pt
    - --checkpoint-dir
    - outputs/real_data/pixarmesh_bootstrap_visiblelocked_resume_b128_train2048/checkpoints_scene_denoiser_v1
    - --save-summary
    - outputs/real_data/pixarmesh_bootstrap_visiblelocked_resume_b128_train2048/denoiser_train_visiblelocked_resume_b128_summary.json
    - --save-every-steps
    - 1000
    log_path: outputs/real_data/pixarmesh_bootstrap_visiblelocked_resume_b128_train2048/logs/denoiser_train_visiblelocked_resume_b128.log
  - name: train_visiblelocked_hiddenfocus_b128
    enabled: true
    match_substring: denoiser_train_visiblelocked_hiddenfocus_b128_summary.json
