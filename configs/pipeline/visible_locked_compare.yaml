      type: summary_field_gte
      path: outputs/real_data/pixarmesh_bootstrap_visiblelocked_hiddenfocus_b128_train2048/denoiser_train_visiblelocked_hiddenfocus_b128_summary.json
      field: end_step
      threshold: 12000
    launch_command:
    - /root/3d/generation/.venv/bin/python
    - scripts/train/train_scene_diffusion.py
    - --config
    - configs/diffusion/visible_locked_hiddenfocus.yaml
    - --data-config
    - configs/data/3dfront_v1.yaml
    - --runtime-config
    - configs/runtime/gpu_smoke.yaml
    - --packet-dir
    - outputs/real_data/pixarmesh_depr_bootstrap_train2048_norm/packets
    - --batch-size
    - 128
    - --max-samples
    - 1949
    - --train-steps
    - 12000
    - --checkpoint-dir
    - outputs/real_data/pixarmesh_bootstrap_visiblelocked_hiddenfocus_b128_train2048/checkpoints_scene_denoiser_v1
    - --save-summary
