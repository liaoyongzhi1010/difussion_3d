model:
  name: scene_diffusion_v1_visible_locked_tradeoff_v050
  arch: scene_denoiser_v1
  d_model: 512
  num_layers: 12
  num_heads: 8
  dropout: 0.1
  ffn_ratio: 4
  k_vis: 12
  k_hid: 8
  z_dim: 256
  pose_dim: 8
  num_classes: 10
  use_uncertainty_token: true
  use_relation_heads: true
  use_layout_token: true
  uses_spatial_conditioning: false
  visible_target_dim: 264
  hidden_target_dim: 264
  visible_mode: deterministic

conditioning:
  use_f_global: true
  use_pose0_calib: true
  use_layout0_calib: true
  use_lock_gate: true
  use_source_embedding: true

matching:
  lambda_cls: 2.0
  lambda_ctr: 5.0
  lambda_size: 2.0
  lambda_yaw: 1.0
  lambda_geo: 1.0

training:
  optimizer: adamw
  lr: 2.0e-4
  weight_decay: 0.05
  batch_size: 8
  grad_accum: 1
  epochs: 80
  warmup_steps: 5000
  lr_schedule: cosine
  mixed_precision: bf16
  clip_grad_norm: 1.0
  ema_decay: 0.999

noise:
  prediction_type: v_prediction
  train_timesteps: 1000
  beta_schedule: cosine
  sampler: ddim
  sampling_steps: 50

data:
  packet_mode: logical
  packet_cache_root: data/cache/scene_packets_v1
  source_mix: [0.6, 0.3, 0.1]
  image_size: 512
  load_inst_masks: false

loss:
  lambda_diff_struct: 1.0
  lambda_diff_geo: 2.0
  lambda_exist: 1.0
  lambda_cls: 1.0
  lambda_pose: 2.0
  lambda_layout: 1.0
  lambda_support: 0.5
  lambda_wall: 0.25
  lambda_floor: 0.25
  lambda_vis_align: 0.5
  lambda_collision: 0.1

logging:
  log_every_steps: 20
  val_every_steps: 1000
  vis_every_steps: 1000
  save_every_steps: 1000
  posterior_eval_n: 5
