views_root: data/metadata/3dfront_v1/views
output_root: data/metadata/3dfront_v1/index_v1
room_split: [0.8, 0.1, 0.1]
seed: 42
filters:
  min_visible_total: 4
  min_major_objects: 1
  min_valid_depth_ratio: 0.85
  min_floor_ratio: 0.05
  max_wall_dominance: 0.75
  require_hidden_labels: false
fields:
  required_meta:
    - sample_id
    - scene_id
    - room_id
    - camera_id
  required_stats:
    - num_visible_total
    - num_major_objects
    - valid_depth_ratio
    - floor_ratio
    - wall_dominance
