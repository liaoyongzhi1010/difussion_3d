views_root: outputs/real_data/pixarmesh_depr_bootstrap_train0/views
output_root: outputs/real_data/pixarmesh_depr_bootstrap_train0/index
room_split: [0.8, 0.1, 0.1]
seed: 42
ignore_filenames:
  - summary.json
filters:
  min_visible_total: 1
  min_major_objects: 1
  min_valid_depth_ratio: 0.5
  min_floor_ratio: 0.0
  max_wall_dominance: 1.0
  require_hidden_labels: true
fields:
  required_meta:
    - sample_id
    - scene_id
    - room_id
    - camera_id
  required_stats:
    - num_visible_total
    - num_major_objects
    - valid_depth_ratio
    - floor_ratio
    - wall_dominance
